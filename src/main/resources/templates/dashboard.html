<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blug Forum Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header class="title-box">
            <h1>Blug Forum</h1>
            <p>Share your thoughts, connect with others.</p>
        </header>

        <section class="create-post-section">
            <h2>Create a New Post</h2>
            <form th:action="@{/posts}" method="post">
                <input type="text" name="title" placeholder="Post Title" required>
                <textarea name="content" placeholder="What's on your mind?" required></textarea>
                <button type="submit" class="btn-primary">Post</button>
            </form>
        </section>

        <section class="posts-section">
            <h2>All Posts</h2>
            <div th:if="${success}" class="alert success" th:text="${success}"></div>
            <div class="posts-grid">
                <div th:each="post : ${posts}" class="post-card">
                    <h3 th:text="${post.title}">Post Title</h3>
                    <p th:text="${post.content}">Post content goes here...</p>
                    <small th:text="${#temporals.format(post.createdAt, 'dd-MM-yyyy HH:mm')}">Date</small>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
